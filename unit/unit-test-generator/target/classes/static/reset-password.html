<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset Password — TestLedger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="auth.css" />
</head>
<body>

<div class="grid-overlay" aria-hidden="true"></div>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="brand-mark">⎯|⎯</span>
      <h1>TestLedger</h1>
    </div>

    <h2 class="auth-heading">Choose a New Password</h2>

    <form id="resetForm">
      <div class="auth-field">
        <label for="newPassword">New Password</label>
        <input type="password" id="newPassword" autocomplete="new-password" required minlength="6" />
      </div>
      <div class="auth-field">
        <label for="confirmPassword">Confirm New Password</label>
        <input type="password" id="confirmPassword" autocomplete="new-password" required minlength="6" />
      </div>
      <button type="submit" class="auth-submit" id="submitBtn">Reset Password</button>
      <div id="authError" class="auth-error hidden"></div>
      <div id="authSuccess" class="auth-success hidden"></div>
    </form>

    <p class="auth-hint"><a href="login.html">Back to Log In</a></p>
  </div>
</div>

<script src="reset-password.js"></script>
</body>
</html>
