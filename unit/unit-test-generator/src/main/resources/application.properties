# ===================== Server =====================
# Cloud platforms (Render, Railway, etc.) inject PORT at runtime; fall back to 8080 locally
server.port=${PORT:8080}

# ===================== MySQL Datasource =====================
# Local dev: create the database first with `CREATE DATABASE testgen_db;`
# Deployed: set DB_URL / DB_USERNAME / DB_PASSWORD as environment variables
# instead of editing this file, so credentials never get committed to Git.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/testgen_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:Your_username}
spring.datasource.password=${DB_PASSWORD:your_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================== JPA / Hibernate =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===================== Groq API =====================
# Get a free API key from https://console.groq.com
# Recommended: set this as an environment variable instead of hardcoding it:
#   export GROQ_API_KEY=your_key_here
groq.api.key=${GROQ_API_KEY:your_groq_apikey}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.model=llama-3.3-70b-versatile

# ===================== JWT Auth =====================
# IMPORTANT: override this with a real secret via env var in production
# (must be at least 32 characters / 256 bits)
jwt.secret=${JWT_SECRET:this-is-a-default-dev-only-secret-key-change-it-in-prod-1234}
# Token lifetime in milliseconds (default: 24 hours)
jwt.expiration-ms=86400000

# ===================== Email (for password reset links) =====================
# Example using Gmail: create an "App Password" at
# https://myaccount.google.com/apppasswords (regular Gmail passwords won't work)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:blessychristrus21@gmail.com}
spring.mail.password=${MAIL_PASSWORD:PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Public URL of this app, used to build the link inside reset emails.
# Set this to your real deployed URL (e.g. Railway domain) in production.
app.base-url=${APP_BASE_URL:http://localhost:8080}

# ===================== Misc =====================
spring.mvc.async.request-timeout=60000
